version: '3'

networks:
  laravel:

services:
  app:
    build:
      context: .
      dockerfile: ./dockerfiles/nginx.prod.dockerfile
      args:
        - UID=${UID:-1000}
        - GID=${GID:-1000}
    ports:
      - "80:80"
      - "8080:8080"
    depends_on:
      - nextjs
      - php
      - redis
      - mysql
      - mailhog
    networks:
      - laravel
  
  nextjs:
    build:
      context: .
      dockerfile: ./dockerfiles/nextjs.dockerfile
    
    ports:
      - "3000:3000"
    networks:
      - laravel

  mysql:
    image: mysql:9.2.0
    restart: always
    tty: true
    ports:
      - 4306:3306
    volumes:
      - ./mysql:/var/lib/mysql
    environment:
      MYSQL_DATABASE: mesax
      MYSQL_USER: austin
      MYSQL_PASSWORD: 923.Eddy
      MYSQL_ROOT_PASSWORD: 923.Eddy
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    networks:
      - laravel

  php:
    build:
      context: .
      dockerfile: ./dockerfiles/php.prod.dockerfile
      args:
        - UID=${UID:-1000}
        - GID=${GID:-1000}
    ports:
      - "9000:9000"
    networks:
      - laravel

  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - laravel

  composer:
    build:
      context: .
      dockerfile: ./dockerfiles/php.prod.dockerfile
      args:
        - UID=${UID:-1001}
        - GID=${GID:-1001}
    depends_on:
      - php
    entrypoint: [ 'composer', '--ignore-platform-reqs' ]
    networks:
      - laravel

  npm:
    image: node:current-alpine
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    entrypoint: [ 'npm' ]
    ports:
      - "3000:3000"
      - "3001:3001"
      - "5173:5173"
    networks:
      - laravel

  artisan:
    build:
      context: .
      dockerfile: ./dockerfiles/php.prod.dockerfile
      args:
        - UID=${UID:-1000}
        - GID=${GID:-1000}
    depends_on:
      - mysql
    entrypoint: [ 'php', '/var/www/html/artisan' ]
    networks:
      - laravel

  pest:
    build:
      context: .
      dockerfile: ./dockerfiles/php.prod.dockerfile
      args:
        - UID=${UID:-1000}
        - GID=${GID:-1000}
    depends_on:
      - mysql
      - redis
    entrypoint: [ 'vendor/bin/pest' ]
    networks:
      - laravel

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - laravel